<article class="service-card">
  <img src="{{ .Get "image" | safeURL }}" alt="{{ .Get "alt" }}" loading="lazy">
  <div class="service-card-body">
    <h2>{{ .Get "name" }}</h2>
    <p>{{ .Inner | markdownify }}</p>
    <div class="service-card-actions">
      <a class="service-card-button service-card-button-secondary" href="{{ .Get "learn" | safeURL }}">Learn More</a>
      <a class="service-card-button service-card-button-primary" href="/contact/">Schedule a Call</a>
    </div>
  </div>
</article>
